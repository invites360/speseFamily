<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spese Family</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 25px;
      backdrop-filter: blur(10px);
    }

    canvas { max-height: 400px; }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    select, input, textarea {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #1e293b;
      color: white;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .summary div {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
    }

    .red { color: #ef4444; }
    .green { color: #22c55e; }

    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="grid">

    <div class="card">
      <h1>Spese Family</h1>

      <select id="month"></select>
      <select id="year"></select>

      <canvas id="chart"></canvas>
    </div>

    <div class="card">
      <h2>Aggiungi Spesa</h2>

      <form id="expenseForm">
        <select id="reporter">
          <option value="Claudia">Claudia</option>
          <option value="Peppe">Peppe</option>
        </select>

        <select id="category">
          <option>SPESE FISSE</option>
          <option>CIBO</option>
          <option>VARIE CASA</option>
          <option>AUTO</option>
          <option>SFIZI</option>
        </select>

        <input type="number" id="amount" placeholder="Importo" required />
        <textarea id="description" placeholder="Descrizione"></textarea>

        <button type="submit">Aggiungi</button>
      </form>

      <div class="summary">
        <div><span>Spese</span><span id="spent">0€</span></div>
        <div><span>Rimanenza</span><span id="remaining">0€</span></div>
      </div>
    </div>

  </div>
</div>

<script>
  // SUPABASE
  const SUPABASE_URL = 'https://pypeboroffarllxbsgpl.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5cGVib3JvZmZhcmxseGJzZ3BsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyOTEzMDcsImV4cCI6MjA4NTg2NzMwN30.zI99QWIHwERLHx3fS1X7gRhB8RJ_1kr8QzzHyi8uLHQ';

  const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const TOTAL = 3500;

  const monthSelect = document.getElementById('month');
  const yearSelect = document.getElementById('year');

  const now = new Date();

  for (let i = 1; i <= 12; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i;
    if (i === now.getMonth() + 1) opt.selected = true;
    monthSelect.appendChild(opt);
  }

  for (let y = now.getFullYear() - 2; y <= now.getFullYear() + 1; y++) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    if (y === now.getFullYear()) opt.selected = true;
    yearSelect.appendChild(opt);
  }

  const chart = new Chart(document.getElementById('chart'), {
    type: 'doughnut',
    data: {
      labels: ['Spese', 'Rimanenza'],
      datasets: [{ data: [0, TOTAL] }]
    }
  });

  async function load() {
    const { data } = await clientSupabase
      .from('SPESA')
      .select('IM_SPESA')
      .eq('MESE', monthSelect.value)
      .eq('ANNO', yearSelect.value);

    const spent = data.reduce((s, x) => s + Number(x.IM_SPESA || 0), 0);
    const remaining = TOTAL - spent;

    chart.data.datasets[0].data = [spent, remaining];
    chart.update();

    document.getElementById('spent').innerText = spent + '€';
    document.getElementById('remaining').innerText = remaining + '€';
  }

  document.getElementById('expenseForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    await clientSupabase.from('SPESA').insert([{
      IM_SPESA: document.getElementById('amount').value,
      DS_SPESA: document.getElementById('description').value,
      MESE: monthSelect.value,
      ANNO: yearSelect.value,
      CATEGORIA: document.getElementById('category').value,
      SEGNALANTE: document.getElementById('reporter').value
    }]);

    this.reset();
    load();
  });

  monthSelect.onchange = load;
  yearSelect.onchange = load;

  load();

  // ✅ FIX SERVICE WORKER (NUOVO CORRETTO)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        const reg = await navigator.serviceWorker.register('./sw.js', {
          scope: './'
        });
        console.log('SW OK:', reg.scope);
      } catch (err) {
        console.error('SW ERROR:', err);
      }
    });
  }
</script>

</body>
</html>
